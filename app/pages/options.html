<!doctype html>
<html lang="en">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link rel="stylesheet" type="text/css" href="../styles/options.css">

  <title>AnnotatorGPT configuration</title>
</head>
<body>
<div class="container">
  <!-- Header -->
  <header></header>

  <!-- Container -->
  <div id="main-container" class="container">

    <div class="jumbotron">
      </br></br>
      <img alt="Review and go logo" title="Review and go logo" class="logo" src="../images/annotateGPT.png">
      <h2 class="title">AnnotatorGPT configuration</h2>
      <div class="card">
        <div class="card-header card-header bg-dark text-white">User manual</div>
        <div class="card-body">
          <div class="form-group">
            Visit whenever you want the <a href="https://github.com/haritzmedina/reviewandgo/wiki" target="_blank">user manual</a> for further information or checkout the <a href="https://www.youtube.com/watch?v=iPC6YEr3qlo">video</a>.
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header bg-dark text-white">AI Configuration</div>
        <div class="card-body">

          <!-- Step 1 -->
          <div class="llm-step">
            <div class="llm-step-header">
              <span class="llm-step-number">1</span>
              <span class="llm-step-title">Choose your AI provider</span>
            </div>
            <div class="provider-grid" id="providerGrid"></div>
          </div>

          <!-- Step 2 -->
          <div class="llm-step" id="step2" style="display:none;">
            <div class="llm-step-header">
              <span class="llm-step-number">2</span>
              <span class="llm-step-title">Enter your API key</span>
              <a id="apiKeyHelpLink" href="#" target="_blank" class="llm-help-link">Where do I get one? &#x2197;</a>
            </div>
            <div class="llm-api-row">
              <input type="password" class="form-control" id="endpointAPIKey" placeholder="Paste your API key here" autocomplete="off"/>
              <button class="btn btn-primary" id="saveEndpointButton">Connect</button>
            </div>
            <div id="endpointURLGroup" style="display:none; margin-top:10px;">
              <label for="endpointURL" style="font-size:0.85em; color:#666;">Base URL</label>
              <input type="text" class="form-control" id="endpointURL" placeholder="e.g., http://localhost:11434/v1"/>
            </div>
            <div id="modelsLoadingIndicator" class="llm-loading" style="display:none;">&#9696; Connecting and fetching models&hellip;</div>
          </div>

          <!-- Step 3 -->
          <div class="llm-step" id="step3" style="display:none;">
            <div class="llm-step-header">
              <span class="llm-step-number">3</span>
              <span class="llm-step-title">Choose a model</span>
            </div>
            <select class="form-control" id="modelDropdown" disabled>
              <option value="">-- Loading models --</option>
            </select>
            <div id="currentConfigSummary" class="llm-summary" style="display:none;"></div>
            <div style="margin-top:10px;">
              <button class="btn btn-sm btn-outline-secondary" id="changeProviderButton">&#8592; Change provider</button>
              <button class="btn btn-sm btn-outline-danger" id="deleteEndpointButton" style="display:none; float:right;">Remove</button>
            </div>
          </div>

        </div>
      </div>
      <div id="localStorageConfigurationCard" class="card storageConfiguration">
        <div class="card-header bg-dark text-white">Local storage</div>
        <div class="card-body">
          <div class="form-check">
            <button class="btn btn-secondary" id="restoreDatabaseButton">Restore annotations</button>
            <button class="btn btn-secondary" id="backupDatabaseButton">Backup annotations</button>
            <button class="btn btn-secondary" id="deleteDatabaseButton">Delete annotations</button>
          </div>
        </div>
      </div>
      </div>
    </div>
  </div>
</div>
<script src="../scripts/options.js"></script>
</body>
</html>
